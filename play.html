<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d0921">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Jugando · Juego para Vacilar</title>
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/play.css">
</head>
<body>
  <header class="game-shell-header">
    <a href="index.html" class="home-button" aria-label="Volver al menú principal">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.15 3.5 10v10.1h6v-6h5v6h6V10L12 3.15Zm6.5 14.95h-2v-6h-9v6h-2v-7.14L12 5.72l6.5 5.24v7.14Z"/></svg>
    </a>
    <div class="game-title">
      <small>Juego para Vacilar</small>
      <strong id="game-name">Cargando…</strong>
    </div>
    <span class="live-dot" aria-hidden="true"></span>
  </header>

  <main class="game-frame-wrap">
    <div id="loader" class="loader" role="status">
      <span></span>
      <p>Barajando el vacile…</p>
    </div>
    <iframe id="game-frame" title="Juego" allow="autoplay" hidden></iframe>
    <section id="game-error" class="game-error" hidden>
      <div>!</div>
      <h1>Este juego no existe</h1>
      <p>Vuelve al menú y elige una de las opciones disponibles.</p>
      <a href="index.html">Ir al menú</a>
    </section>
  </main>

  <script src="js/play.js"></script>
</body>
</html>
